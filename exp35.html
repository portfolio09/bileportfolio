<!DOCTYPE html> 
<html lang="en"> 
<head> 
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1"> 
<title>Technical Profile</title>
<style>
/* Modern Tech Background */
body { 
  margin: 0; 
  font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
  background: #0f172a; /* Deep Navy Tech Background */
  background-image: radial-gradient(circle at 2px 2px, #1e293b 1px, transparent 0);
  background-size: 40px 40px; /* Subtle grid pattern */
  color: #e2e8f0;
  min-height: 100vh;
} 

/* Navigation */
.topnav { 
  overflow: hidden; 
  background-color: #1e293b; 
  border-bottom: 2px solid #334155;
} 
.topnav a { 
  float: left; 
  color: #94a3b8; 
  text-align: center; 
  padding: 16px 20px; 
  text-decoration: none; 
  font-size: 17px; 
  transition: 0.3s;
} 
.topnav a:hover { 
  color: #fff; 
} 
.topnav a.active { 
  background-color: #3b82f6; /* Tech Blue */
  color: white; 
} 

/* Layout Container */
.container {
  max-width: 800px;
  margin: 50px auto;
  padding: 20px;
}

/* Section Cards */
.card {
  background: rgba(30, 41, 59, 0.7);
  backdrop-filter: blur(10px);
  border: 1px solid #334155;
  border-radius: 12px;
  padding: 25px;
  margin-bottom: 20px;
  transition: transform 0.2s;
}
.card:hover {
  transform: translateY(-5px);
  border-color: #3b82f6;
}

h1 {
  font-size: 1.2rem;
  color: #3b82f6;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-top: 0;
  margin-bottom: 15px;
}

/* Modern List Styling */
ul {
  list-style: none;
  padding: 0;
  margin: 0;
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

li {
  background: #334155;
  padding: 8px 16px;
  border-radius: 20px;
  font-size: 0.95rem;
  color: #f1f5f9;
  border: 1px solid transparent;
}

/* Project Highlight */
.project-name {
  font-weight: bold;
  color: #10b981; /* Emerald green for projects */
}

</style> 
</head> 
<body> 

<div class="topnav"> 
  <a class="active" href="#Technical">Technical Profile</a> 
</div> 

<div class="container"> 
  
  <div class="card">
    <h1>Programming Languages</h1>
    <ul>
      <li>C</li>
      <li>C++</li>
      <li>HTML & CSS</li>
    </ul>
  </div>

  <div class="card">
    <h1>Operating Systems</h1>
    <ul>
      <li>Windows</li>
      <li>Linux (Ubuntu/Debian)</li>
    </ul>
  </div>

  <div class="card">
    <h1>Professional Courses</h1>
    <ul>
      <li>MS-CIT</li>
      <li>Typing (30 WPM)</li>
    </ul>
  </div>

  <div class="card">
    <h1>Certifications</h1>
    <ul>
      <li>Dark C Logic</li>
      <li>Technical Quiz Winner</li>
    </ul>
  </div>

  <div class="card">
    <h1>Key Projects</h1>
    <ul>
      <li class="project-name">Online Shopping Website</li>
    </ul>
  </div>

</div> 

</body> 
</html>
